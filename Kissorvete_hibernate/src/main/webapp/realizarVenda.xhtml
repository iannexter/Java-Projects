<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Venda de Gelatos</title>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@^3/primeflex.css" />
        <style>
        h2 {
            text-align: center;
            font-weight: bold;
        }
    </style>
</h:head>
<h:body>

<p:growl id="msgGlobal" life="5000" closable="true" />

<p:menubar hideDelay="1000">
        <f:facet name="start">
            <p:graphicImage name="images/primefaces-logo.svg" library="showcase" />
        </f:facet>
        
        <p:menuitem value="Inicio" icon="pi pi-fw pi-user" outcome="home.xhtml" />
        
        <p:submenu label="Cadastros" icon="pi pi-fw pi-plus">
            <p:submenu label="Produtos" icon="pi pi-fw pi-file">
                <p:menuitem value="Gelatos" icon="pi pi-save" outcome="gelatos.xhtml"/>
            </p:submenu>
        </p:submenu>



        <p:submenu label="Usuários" icon="pi pi-fw pi-user">
            <p:menuitem value="Gerenciar" icon="pi pi-fw pi-users" outcome="usuarios.xhtml"/>
        </p:submenu>


            <p:submenu label="Vendas" icon="pi pi-fw pi-calendar">
                   <p:menuitem value="Realizar Venda" icon="pi pi-fw pi-plus" outcome="realizarVenda.xhtml"/> 

                
				<p:menuitem value="Visualizar Vendas" icon="pi pi-save" outcome="visualizarVendas.xhtml"/>  

            </p:submenu>


        <p:menuitem value="Logout" icon="pi pi-fw pi-power-off" action="#{loginBean.logout}" />
    </p:menubar>

    <h:form>
            <h2>Lista de Gelatos</h2>
        <p:dataTable value="#{vendaBean.gelatos}" var="gelato" paginator="true" rows="10" styleClass="table">


            <p:column headerText="Nome">
                #{gelato.nome}
            </p:column>
            <p:column headerText="Tipo">
                #{gelato.tipo}
            </p:column>
            <p:column headerText="Preço">
                #{gelato.preco}
            </p:column>
            <p:column>
                <p:commandButton value="Adicionar ao Carrinho" actionListener="#{vendaBean.adicionarAoCarrinho(gelato)}" update="@form" />
            </p:column>
        </p:dataTable>

        <h2>Carrinho de Compras</h2>
        
        <p:dataTable value="#{vendaBean.carrinho}" var="item" paginator="true" rows="10" styleClass="table">
            <p:column headerText="Nome">
                #{item.nome}
            </p:column>
            <p:column headerText="Tipo">
                #{item.tipo}
            </p:column>
            <p:column headerText="Preço">
                #{item.preco}
            </p:column>
            <p:column>
                <p:commandButton value="Remover" actionListener="#{vendaBean.removerDoCarrinho(item)}" update="@form" />
            </p:column>
            
        </p:dataTable>



        <h3>Total: #{vendaBean.total}</h3>

        <p:commandButton value="Finalizar Venda" action="#{vendaBean.finalizarVenda}" update="@form" oncomplete= " :msgGlobal" />
    </h:form>
</h:body>
</html>
