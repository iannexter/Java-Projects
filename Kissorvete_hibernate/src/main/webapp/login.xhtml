<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login</title>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@^3/primeflex.css" />
    
    <style>
        .flex align-items-center justify-content-center {
            text-align: center;
            display: flex;
 		 	justify-content: center;
  			align-items: center;
        }
    </style>
</h:head>
<h:body>
    <h:form>
        <div class="flex align-items-center justify-content-center">
            <div class="surface-card p-4 shadow-2 border-round w-full lg:w-6">
                <div class="text-center mb-5">
                    <p:graphicImage name="homeLogin.png" library="imagens" alt="Image"
                                    height="350" styleClass="mb-3"/>
                    
                </div>

                <div>
                    <label for="username" class="block text-900 font-medium mb-2">Usuário</label>
                    <p:inputText id="username" value="#{loginBean.username}" styleClass="w-full mb-3" placeholder="Nome de usuário"/>

                    <label for="password" class="block text-900 font-medium mb-2">Senha</label>
                    <p:password id="password" value="#{loginBean.password}" styleClass="w-full mb-3" placeholder="Senha"/>

                    <div class="flex align-items-center justify-content-between mb-6">
                        <div class="flex align-items-center">

                        </div>
                    </div>

                    <p:commandButton value="Login" action="#{loginBean.login}" icon="pi pi-user" styleClass="w-full"/>
                </div>
            </div>
        </div>
    </h:form>
</h:body>
</html>
