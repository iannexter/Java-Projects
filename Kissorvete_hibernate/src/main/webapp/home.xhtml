<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Home</title>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css" />
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .centralizar {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</h:head>
<h:body>
    <h:form>
    </h:form>

    <p:menubar hideDelay="1000">
        <f:facet name="start">
            <p:graphicImage name="images/primefaces-logo.svg" library="showcase" />
        </f:facet>
        
        <p:menuitem value="Inicio" icon="pi pi-fw pi-user" outcome="home.xhtml" />
        
        <p:submenu label="Cadastros" icon="pi pi-fw pi-plus">
            <p:submenu label="Produtos" icon="pi pi-fw pi-file">
                <p:menuitem value="Gelatos" icon="pi pi-save" outcome="gelatos.xhtml"/>
            </p:submenu>
        </p:submenu>



        <p:submenu label="Usuários" icon="pi pi-fw pi-user">
            <p:menuitem value="Gerenciar" icon="pi pi-fw pi-users" outcome="usuarios.xhtml"/>
        </p:submenu>


            <p:submenu label="Vendas" icon="pi pi-fw pi-calendar">
                   <p:menuitem value="Realizar Venda" icon="pi pi-fw pi-plus" outcome="realizarVenda.xhtml"/> 

                
				<p:menuitem value="Visualizar Vendas" icon="pi pi-save" outcome="visualizarVendas.xhtml"/>  

            </p:submenu>


        <p:menuitem value="Logout" icon="pi pi-fw pi-power-off" action="#{loginBean.logout}" />
    </p:menubar>

    <div class="centralizar">
        <div class="text-6xl text-primary font-bold mb-3">Bem vindo, #{loginBean.username}!</div>
    </div>

    <div class="container">
        <h:graphicImage library="imagens" name="logo-home2.png" />
    </div>
</h:body>
</html>
