<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Visualizar e Remover Vendas</title>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@^3/primeflex.css" />
</h:head>
<h:body>

<p:growl id="msgGlobal" life="5000" closable="true" />

<p:menubar hideDelay="1000">
        <f:facet name="start">
            <p:graphicImage name="images/primefaces-logo.svg" library="showcase" />
        </f:facet>
        
        <p:menuitem value="Inicio" icon="pi pi-fw pi-user" outcome="home.xhtml" />
        
        <p:submenu label="Cadastros" icon="pi pi-fw pi-plus">
            <p:submenu label="Produtos" icon="pi pi-fw pi-file">
                <p:menuitem value="Gelatos" icon="pi pi-save" outcome="gelatos.xhtml"/>
            </p:submenu>
        </p:submenu>



        <p:submenu label="Usuários" icon="pi pi-fw pi-user">
            <p:menuitem value="Gerenciar" icon="pi pi-fw pi-users" outcome="usuarios.xhtml"/>
        </p:submenu>


            <p:submenu label="Vendas" icon="pi pi-fw pi-calendar">
                   <p:menuitem value="Realizar Venda" icon="pi pi-fw pi-plus" outcome="realizarVenda.xhtml"/> 

                
				<p:menuitem value="Visualizar Vendas" icon="pi pi-save" outcome="visualizarVendas.xhtml"/>  

            </p:submenu>


        <p:menuitem value="Logout" icon="pi pi-fw pi-power-off" action="#{loginBean.logout}" />
    </p:menubar>

	<br/>


    <h:form id="vendasForm">
    
    <p:commandButton value="Gerar PDF" action="#{visualizarVendasBean.gerarPDF}" ajax="false" styleClass="mr-2 mb-2" />

        <p:dataTable value="#{visualizarVendasBean.vendas}" var="venda" border="1">
                       <f:facet name="header">
                    <h:outputText value="Lista de vendas" styleClass="font-bold" />
                </f:facet>


        
            <p:column headerText="ID">
                #{venda.id}
            </p:column>
            <p:column headerText="Data">
                #{visualizarVendasBean.formatarData(venda.dataVenda)}
            </p:column>
            <p:column headerText="Valor">
    #{venda.total}
</p:column>
<p:column headerText="Ações">
    <p:commandButton value="Remover" class="ui-button-danger" icon="pi pi-trash" 
                     oncomplete="PF('eliminarVendaDialog').show()" process="@this">
        <f:setPropertyActionListener target="#{visualizarVendasBean.vendaSelecionada}" value="#{venda}" />
        <p:ajax update="@form"/>
    </p:commandButton>
</p:column>
</p:dataTable>

<p:confirmDialog widgetVar="eliminarVendaDialog" showEffect="fade" width="300" 
                 message="Remover a venda?" header="Confirmar" severity="warn">
    <p:commandButton value="Sim" icon="pi pi-check" actionListener="#{visualizarVendasBean.removerVenda}"
                     process="@this" oncomplete="PF('eliminarVendaDialog').hide(); window.location.reload(true); :msgGlobal" />
    <p:commandButton value="Não" type="button" styleClass="ui-button-secondary" icon="pi pi-times"
                     onclick="PF('eliminarVendaDialog').hide()" />
</p:confirmDialog>
    </h:form>
</h:body>
</html>
